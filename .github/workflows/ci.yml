name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,eval]"

      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  rag-eval:
    name: RAG eval gate
    runs-on: ubuntu-latest
    needs:
      - backend
    env:
      DOC_ASSISTANT_CHAT_API_KEY: ${{ secrets.DOC_ASSISTANT_CHAT_API_KEY }}
      DOC_ASSISTANT_EMBEDDING_API_KEY: ${{ secrets.DOC_ASSISTANT_EMBEDDING_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check eval credentials
        id: eval_credentials
        shell: bash
        run: |
          if [[ -n "$DOC_ASSISTANT_CHAT_API_KEY" && -n "$DOC_ASSISTANT_EMBEDDING_API_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "RAG eval skipped because DOC_ASSISTANT_CHAT_API_KEY or DOC_ASSISTANT_EMBEDDING_API_KEY is not configured."
          fi

      - name: Set up Python
        if: steps.eval_credentials.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eval dependencies
        if: steps.eval_credentials.outputs.enabled == 'true'
        run: python -m pip install -e ".[dev,eval]"

      - name: Run RAG eval gate
        if: steps.eval_credentials.outputs.enabled == 'true'
        shell: bash
        run: |
          baseline_args=()
          if [[ -f data/eval/baseline_report.json ]]; then
            baseline_args=(--baseline data/eval/baseline_report.json --fail-on-regression)
          fi
          python scripts/run_rag_eval.py \
            --clean \
            --concurrency 2 \
            "${baseline_args[@]}" \
            --min-score retrieval.at_5.recall=0.8 \
            --min-score generation.citation_accuracy=0.9

      - name: Upload RAG eval report
        if: steps.eval_credentials.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: data/eval/latest_report.json
